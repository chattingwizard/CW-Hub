name: Diagnose Email/SMTP

on:
  workflow_dispatch:

jobs:
  check-email:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for rate limit to clear then test SMTP
        timeout-minutes: 8
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "=== Waiting 5 minutes for global rate limit to clear ==="
          echo "Started at: $(date -u)"
          sleep 300
          echo "Resumed at: $(date -u)"

          echo ""
          echo "=== 1. SMTP Test: /recover for midaleh12@gmail.com ==="
          RECOVER_RESP=$(curl -s -w "\n%{http_code}" \
            "${SUPABASE_URL}/auth/v1/recover" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"email":"midaleh12@gmail.com"}')
          REC_CODE=$(echo "$RECOVER_RESP" | tail -1)
          REC_BODY=$(echo "$RECOVER_RESP" | sed '$d')
          echo "HTTP: $REC_CODE"
          echo "Body: $REC_BODY"

          if [ "$REC_CODE" = "200" ]; then
            echo ">>> SUCCESS: Recovery email SENT. SMTP/Resend is working."
          elif [ "$REC_CODE" = "429" ]; then
            echo ">>> RATE LIMIT still active. Waiting 60 more seconds..."
            sleep 65
            RECOVER_RESP2=$(curl -s -w "\n%{http_code}" \
              "${SUPABASE_URL}/auth/v1/recover" \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"email":"midaleh12@gmail.com"}')
            REC_CODE2=$(echo "$RECOVER_RESP2" | tail -1)
            REC_BODY2=$(echo "$RECOVER_RESP2" | sed '$d')
            echo "Retry HTTP: $REC_CODE2"
            echo "Retry Body: $REC_BODY2"
            if [ "$REC_CODE2" = "200" ]; then
              echo ">>> SUCCESS on retry: Recovery email SENT."
            else
              echo ">>> FAILED on retry too."
            fi
          else
            echo ">>> SMTP ERROR: Status $REC_CODE indicates email sending failure."
            echo ">>> This confirms the SMTP/Resend configuration is broken."
          fi

          echo ""
          echo "=== 2. Verify: try signup confirmation for a fresh email ==="
          FRESH_EMAIL="cw.diag.$(date +%s)@gmail.com"
          echo "Signing up: $FRESH_EMAIL"
          SIGNUP_RESP=$(curl -s -w "\n%{http_code}" \
            "${SUPABASE_URL}/auth/v1/signup" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$FRESH_EMAIL\",\"password\":\"DiagTest123!\"}")
          SU_CODE=$(echo "$SIGNUP_RESP" | tail -1)
          SU_BODY=$(echo "$SIGNUP_RESP" | sed '$d')
          echo "Signup HTTP: $SU_CODE"
          echo "$SU_BODY" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          u=d.get('user',d)
          print('User:', u.get('id','?')[:8]+'...')
          print('Confirmed:', u.get('email_confirmed_at','null'))
          print('Confirmation sent:', u.get('confirmation_sent_at','null'))
          ids = u.get('identities',[])
          print('Identities:', len(ids) if ids else 0)
          " 2>/dev/null || echo "$SU_BODY"

          echo ""
          echo "=== 3. Cleanup: delete test user ==="
          FRESH_ID=$(echo "$SU_BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('user',d).get('id',''))" 2>/dev/null)
          if [ -n "$FRESH_ID" ]; then
            curl -s -o /dev/null -w "Delete HTTP: %{http_code}\n" \
              -X DELETE "${SUPABASE_URL}/auth/v1/admin/users/$FRESH_ID" \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}"
          fi

          echo ""
          echo "=== DIAGNOSTIC COMPLETE ==="
