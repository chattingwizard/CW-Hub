name: Test Built-in Mailer

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test recovery with built-in mailer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          REF=$(echo "$SUPABASE_URL" | sed 's|https://||;s|\.supabase\.co||')

          echo "=== Test 1: mellyawood@gmail.com ==="
          R1=$(curl -s -o /tmp/b1.txt -w "%{http_code}" -X POST \
            "https://${REF}.supabase.co/auth/v1/recover" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"email":"mellyawood@gmail.com"}')
          echo "HTTP: $R1 | Body: $(cat /tmp/b1.txt)"

          sleep 65

          echo ""
          echo "=== Test 2: lopezpau032@gmail.com ==="
          R2=$(curl -s -o /tmp/b2.txt -w "%{http_code}" -X POST \
            "https://${REF}.supabase.co/auth/v1/recover" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"email":"lopezpau032@gmail.com"}')
          echo "HTTP: $R2 | Body: $(cat /tmp/b2.txt)"
