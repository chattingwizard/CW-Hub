name: Fix User Identity

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Test SMTP for multiple users
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          test_recover() {
            local email="$1"
            RESP=$(curl -s -w "\n%{http_code}" \
              "${SUPABASE_URL}/auth/v1/recover" \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"$email\"}")
            CODE=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            echo "$email => HTTP $CODE | $BODY"
          }

          echo "=== Testing /recover for different users (60s apart) ==="

          echo "--- Test 1: mellyawood@gmail.com ---"
          test_recover "mellyawood@gmail.com"

          echo "Waiting 65s..."
          sleep 65

          echo "--- Test 2: pau@chattingwizard.com ---"
          test_recover "pau@chattingwizard.com"

          echo "Waiting 65s..."
          sleep 65

          echo "--- Test 3: midaleh12@gmail.com ---"
          test_recover "midaleh12@gmail.com"

          echo "Waiting 65s..."
          sleep 65

          echo "--- Test 4: lopezpau032@gmail.com ---"
          test_recover "lopezpau032@gmail.com"

          echo ""
          echo "=== DONE ==="
          echo "If all 500: SMTP is globally broken"
          echo "If some 200 some 500: per-user or per-domain issue"
          echo "If all 200: SMTP works (was transient)"
