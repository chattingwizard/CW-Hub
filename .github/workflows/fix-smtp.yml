name: Fix SMTP - Disable Custom SMTP

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Disable custom SMTP via Management API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          REF=$(echo "$SUPABASE_URL" | sed 's|https://||;s|\.supabase\.co||')
          echo "Project ref: $REF"

          echo "=== 1. Install Supabase CLI ==="
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.75.0/supabase_linux_amd64.tar.gz | tar xz
          chmod +x supabase
          ./supabase --version

          echo ""
          echo "=== 2. Check current GoTrue SMTP config ==="
          curl -s "https://${REF}.supabase.co/auth/v1/admin/config" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" | python3 -c "
          import sys,json
          try:
            d=json.load(sys.stdin)
            smtp_keys = {k:v for k,v in d.items() if 'smtp' in k.lower() or 'mail' in k.lower() or 'email' in k.lower()}
            if smtp_keys:
              print('SMTP-related config:')
              for k,v in smtp_keys.items():
                print(f'  {k}: {v}')
            else:
              print('No SMTP keys found in config. Full config keys:')
              for k in sorted(d.keys()):
                print(f'  {k}')
          except Exception as e:
            print('Error parsing:', e)
            print(sys.stdin.read())
          "

          echo ""
          echo "=== 3. Test sending recovery email ==="
          RESULT=$(curl -s -w "\n%{http_code}" -X POST "https://${REF}.supabase.co/auth/v1/recover" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"email":"midaleh12@gmail.com"}')
          HTTP_CODE=$(echo "$RESULT" | tail -1)
          BODY=$(echo "$RESULT" | head -n -1)
          echo "HTTP: $HTTP_CODE"
          echo "Body: $BODY"

          echo ""
          echo "=== 4. Test generate_link (admin endpoint) ==="
          LINK_RESULT=$(curl -s "https://${REF}.supabase.co/auth/v1/admin/generate_link" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"type":"recovery","email":"midaleh12@gmail.com","options":{"redirect_to":"https://cw-hub.pages.dev/#/update-password"}}')
          echo "generate_link response:"
          echo "$LINK_RESULT" | python3 -c "
          import sys,json
          try:
            d=json.load(sys.stdin)
            if 'action_link' in d:
              print('SUCCESS - action_link generated')
              print('Link:', d['action_link'][:80] + '...')
            elif 'properties' in d and 'action_link' in d.get('properties',{}):
              print('SUCCESS - action_link in properties')
              print('Link:', d['properties']['action_link'][:80] + '...')
            else:
              print(json.dumps(d, indent=2))
          except:
            print(sys.stdin.read())
          "

          echo ""
          echo "=== 5. Try updating auth config via Management API (service key) ==="
          UPDATE_RESULT=$(curl -s -w "\n%{http_code}" -X PATCH "https://api.supabase.com/v1/projects/${REF}/config/auth" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"smtp_admin_email":"","smtp_host":"","smtp_port":"","smtp_user":"","smtp_pass":"","smtp_sender_name":""}')
          UPDATE_CODE=$(echo "$UPDATE_RESULT" | tail -1)
          UPDATE_BODY=$(echo "$UPDATE_RESULT" | head -n -1)
          echo "Management API update HTTP: $UPDATE_CODE"
          echo "Body: $UPDATE_BODY"
