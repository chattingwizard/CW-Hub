name: Fix Resend DKIM DNS

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check Cloudflare zones and fix DKIM
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== 1. List Cloudflare zones ==="
          ZONES=$(curl -s "https://api.cloudflare.com/client/v4/zones?account.id=${CF_ACCOUNT}" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json")
          echo "$ZONES" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          if d.get('success'):
            for z in d.get('result',[]):
              print(f'Zone: {z[\"name\"]} (id={z[\"id\"]}, status={z[\"status\"]})')
          else:
            print('Error:', d.get('errors'))
          "

          echo ""
          echo "=== 2. Check if chattingwizard.com is in Cloudflare ==="
          CW_ZONE=$(echo "$ZONES" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for z in d.get('result',[]):
            if z['name']=='chattingwizard.com':
              print(z['id'])
              break
          " 2>/dev/null)

          if [ -n "$CW_ZONE" ]; then
            echo "Found zone: $CW_ZONE"
            echo ""
            echo "=== 3. List existing DNS records for resend._domainkey ==="
            curl -s "https://api.cloudflare.com/client/v4/zones/${CW_ZONE}/dns_records?name=resend._domainkey.chattingwizard.com" \
              -H "Authorization: Bearer ${CF_TOKEN}" | python3 -m json.tool

            echo ""
            echo "=== 4. Update DKIM record ==="
            DKIM_VALUE='p=MIGfMA0GCSqGSIb3DQEBAQUAA4GNADCBiQKBgQDPfQGNpmfno809+xsOgWVFNPq/yGVYtq8zHJ2uVBX/YaEEqsaIBwGPLK+xAQh2MtM76L5wLLdWtyzzOZn5QaPGsrg+H4glvLvwyq5LIXRMCo13VgmIAxo1HbGajCj9MlgPFjIqgAuGT14/IVLYK0+scxQiE9Fh+HZHo3qujHZsRQIDAQAB'

            EXISTING=$(curl -s "https://api.cloudflare.com/client/v4/zones/${CW_ZONE}/dns_records?name=resend._domainkey.chattingwizard.com&type=TXT" \
              -H "Authorization: Bearer ${CF_TOKEN}")
            RECORD_ID=$(echo "$EXISTING" | python3 -c "import sys,json; r=json.load(sys.stdin).get('result',[]); print(r[0]['id'] if r else '')" 2>/dev/null)

            if [ -n "$RECORD_ID" ]; then
              echo "Updating existing record $RECORD_ID..."
              curl -s -X PATCH "https://api.cloudflare.com/client/v4/zones/${CW_ZONE}/dns_records/${RECORD_ID}" \
                -H "Authorization: Bearer ${CF_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"content\":\"${DKIM_VALUE}\"}" | python3 -m json.tool
            else
              echo "Creating new DKIM record..."
              curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CW_ZONE}/dns_records" \
                -H "Authorization: Bearer ${CF_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"type\":\"TXT\",\"name\":\"resend._domainkey\",\"content\":\"${DKIM_VALUE}\",\"ttl\":3600}" | python3 -m json.tool
            fi
          else
            echo "chattingwizard.com NOT found in Cloudflare."
            echo "DNS is managed by Hostinger. Cannot update automatically."
          fi
