name: Verify Email Works

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Send test recovery
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          REF=$(echo "$SUPABASE_URL" | sed 's|https://||;s|\.supabase\.co||')

          echo "--- mellyawood@gmail.com ---"
          R=$(curl -s -o /tmp/b.txt -w "%{http_code}" -X POST \
            "https://${REF}.supabase.co/auth/v1/recover" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"email":"mellyawood@gmail.com"}')
          echo "HTTP: $R | Body: $(cat /tmp/b.txt)"
